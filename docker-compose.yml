services:
  postgres:
    image: postgres:16-alpine
    container_name: sciagent-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: sciagent
      POSTGRES_PASSWORD: sciagent
      POSTGRES_DB: sciagent
    ports:
      - "5432:5432"
    volumes:
      - sciagent_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sciagent -d sciagent"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  sciagent_pgdata:

