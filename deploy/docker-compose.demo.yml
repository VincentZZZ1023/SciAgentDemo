services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: sciagent
      POSTGRES_PASSWORD: sciagent
      POSTGRES_DB: sciagent
    volumes:
      - sciagent_demo_pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sciagent -d sciagent"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ..
      dockerfile: backend/Dockerfile
    restart: unless-stopped
    env_file:
      - ./backend.env
    environment:
      DATABASE_URL: postgresql+psycopg2://sciagent:sciagent@postgres:5432/sciagent
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ${RESEARCH_AGENT_HOST_ROOT}:${RESEARCH_AGENT_HOST_ROOT}
      - ${SCIAGENT_RUNS_HOST_ROOT}:${SCIAGENT_RUNS_HOST_ROOT}
    ports:
      - "8000:8000"

  frontend:
    build:
      context: ..
      dockerfile: frontend/Dockerfile
      args:
        VITE_BACKEND_BASE_URL: ${VITE_BACKEND_BASE_URL:-}
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "8080:80"

volumes:
  sciagent_demo_pgdata:
